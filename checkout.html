<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/pa-lounge (gold).svg">
<title>Checkout — Jyde Lounge</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --black: #0D0D0D;
    --black-card: #0D0D0D;
    --black-border: #1A1A1A;
    --white: #FAFAF8;
    --muted: #6B6B6B;
    --font-display: 'Manrope', sans-serif;
    --font-body: 'Manrope', sans-serif;
  }
  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    margin: 0;
    padding: 0;
  }
  .nav-logo {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--white);
    text-decoration: none;
    padding: 28px 60px;
  }
  .nav-logo span { color: var(--gold); }
  
  .checkout-container {
    max-width: 800px;
    margin: 60px auto;
    padding: 0 40px;
  }
  .checkout-title {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 300;
    margin-bottom: 40px;
  }
  .checkout-title em { font-style: italic; color: var(--gold); }
  
  .form-group {
    margin-bottom: 24px;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--black-border);
    border-bottom-color: rgba(201,168,76,0.2);
    color: var(--white);
    padding: 16px;
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
    box-sizing: border-box;
    border-radius: 8px;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: rgba(201,168,76,0.3);
    border-bottom-color: var(--gold);
    background: rgba(201,168,76,0.03);
  }
  .form-group textarea {
    resize: vertical;
    min-height: 120px;
  }
  .form-submit {
    width: 100%;
    padding: 20px;
    background: var(--gold);
    color: var(--black);
    font-family: var(--font-body);
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 500;
    border: none;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.3s;
  }
  .form-submit:hover { background: var(--gold-light); }
  
  #successMessage {
    display: none;
    padding: 30px;
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--gold);
    color: var(--gold);
    text-align: center;
    margin-top: 20px;
    font-size: 18px;
    font-family: var(--font-display);
  }
</style>
<!-- Include Supabase & Paystack JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Include Paystack Inline JS -->
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

<a href="index.html" class="nav-logo">Jyde's<span>lounge</span></a>

<div class="checkout-container">
  <h1 class="checkout-title">Complete Your <em>Order</em></h1>
  
  <div id="productSummary" style="background:rgba(201,168,76,0.05); border:1px solid var(--gold); padding:24px; margin-bottom:32px; display:flex; justify-content:space-between; align-items:center;">
    <div style="font-family:var(--font-display); font-size:24px; font-weight:400; color:var(--white);" id="displayItemName">Loading...</div>
    <div style="font-family:var(--font-body); font-size:18px; color:var(--gold);" id="displayItemPrice"></div>
  </div>
  
  <form id="checkoutForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" name="name" required placeholder="Adebayo Okafor">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" name="phone" required placeholder="070 0000 0000">
    </div>
    <div class="form-group">
      <label>Delivery Address (If Applicable)</label>
      <textarea id="address" name="address" placeholder="123 Street Name, Lagos..."></textarea>
    </div>

    
    <button type="submit" class="form-submit">Pay with Paystack & Order</button>
  </form>
</div>

<script>
  const form = document.getElementById('checkoutForm');
  
  const urlParams = new URLSearchParams(window.location.search);
  const selectedItem = urlParams.get('item');
  const selectedPriceStr = urlParams.get('price');
  
  if (!selectedItem || !selectedPriceStr) {
    showModal("No item selected. Redirecting to menu...");
    setTimeout(() => { window.location.href = "index.html#menu"; }, 2000);
  } else {
    document.getElementById('displayItemName').textContent = selectedItem;
    document.getElementById('displayItemPrice').textContent = "₦" + parseInt(selectedPriceStr).toLocaleString();
  }
  
  // NOTE: Replace these with your actual keys
  const paystackKey = 'pk_test_637624891cbcba5552cba40020756572a63ce376'; 
  const supabaseUrl = 'https://tkgyqbbryewvixykpqtl.supabase.co'
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrZ3lxYmJyeWV3dml4eWtwcXRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjExNTksImV4cCI6MjA5NzAzNzE1OX0.xyFFu5jteZuaFLw218nSbL0nfoaxYA8FTxh_8sDEF6k';
  
  // Initialize Supabase Client
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const name = document.getElementById('fullName').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;
    
    
    // For demo purposes, flat amount of 5000 NGN. 
    const amount = parseInt(selectedPriceStr) * 100; 

    // Initialize Paystack Checkout
    let handler = PaystackPop.setup({
      key: paystackKey,
      email: email,
      amount: amount,
      currency: 'NGN',
      ref: 'JYDE_'+Math.floor((Math.random() * 1000000000) + 1),
      callback: function(response){
        // Payment complete! 
        submitToSupabase(name, email, phone, address, selectedItem, response.reference);
      },
      onClose: function(){
        showModal('Payment window closed.');
      }
    });
    handler.openIframe();
  });

  async function submitToSupabase(name, email, phone, address, orderDetails, paymentReference) {
    // Submit to Formspree
    const formspreeOrderUrl = 'https://formspree.io/f/xdavyddd'; // Replace with actual Formspree ID
    const formData = new FormData(form);
    formData.append('payment_reference', paymentReference);
    try {
      await fetch(formspreeOrderUrl, {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      });
    } catch (err) {
      console.error('Formspree error:', err);
    }

    const { data, error } = await supabaseClient
      .from('orders')
      .insert([
        { 
          name: name, 
          email: email, 
          phone: phone, 
          address: address, 
          order_details: orderDetails,
          payment_reference: paymentReference
        }
      ]);
      
    if (error) {
      console.error('Error saving order to Supabase:', error);
      showModal("Payment was successful, but there was an error saving your order details to the database.");
    } else {
      showModal('Your order has been placed successfully! Redirecting to homepage...'); setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    }
  }
</script>


<div id="customModal" style="display:none; position:fixed; z-index:9999; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(5px);">
  <div style="background:var(--black-card); border:1px solid var(--gold); padding:40px; max-width:400px; width:100%; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <p id="customModalMsg" style="color:var(--white); font-size:16px; margin-bottom:24px; line-height:1.5; font-family:var(--font-body);"></p>
    <button onclick="document.getElementById('customModal').style.display='none'" style="padding:12px 32px; background:var(--gold); border:none; color:var(--black); font-family:var(--font-body); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; font-weight:500; transition:background 0.3s;" onmouseover="this.style.background='var(--gold-light)'" onmouseout="this.style.background='var(--gold)'">Close</button>
  </div>
</div>
<script>
  function showModal(msg) {
    document.getElementById('customModalMsg').textContent = msg;
    document.getElementById('customModal').style.display = 'flex';
  }
</script>
</body>
</html>
